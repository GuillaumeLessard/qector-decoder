[build-system]
requires = ["maturin>=1.14,<2.0"]
build-backend = "maturin"

[project]
name = "qector-decoder-v3"
version = "0.5.0"
description = "Source-available Rust/Python QEC R&D platform: PyMatching-compatible validation, belief-matching, BP-OSD (LDPC/qLDPC), CPU/GPU batch decoding, and artifact-hashed benchmark evidence"
readme = "README.md"
requires-python = ">=3.9"
license = {file = "LICENSE"}
authors = [
    {name = "Guillaume Lessard / iD01t Productions", email = "admin@qector.store"}
]
keywords = ["quantum", "error correction", "decoder", "union-find", "QEC", "rust"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: Other/Proprietary License",
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "hypothesis>=6.0.0",
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "httpx>=0.27.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
    "pytest-cov>=4.0.0",
]
# Stim ecosystem: DEM loading, syndrome sampling, Sinter harness, and
# PyMatching / belief-matching / BP-OSD cross-checks.
stim = [
    "stim>=1.12",
    "pymatching>=2.0",
    "sinter>=1.12",
    "ldpc>=2.0",
    "beliefmatching>=0.2",
]
# Reproducible benchmark harness: memory probing, plots and tables.
bench = [
    "psutil>=5.9",
    "matplotlib>=3.7",
    "tabulate>=0.9",
    "scipy>=1.10",
]
# GPU acceleration is enabled at build time via Cargo features. These extras exist so
# `pip install qector-decoder-v3[cuda]` / `[opencl]` resolve cleanly. See INSTALL.md.
cuda = []
opencl = []
all = [
    "stim>=1.12",
    "pymatching>=2.0",
    "sinter>=1.12",
    "ldpc>=2.0",
    "beliefmatching>=0.2",
    "psutil>=5.9",
    "matplotlib>=3.7",
    "tabulate>=0.9",
    "scipy>=1.10",
]

[project.urls]
Homepage = "https://www.qector.store"
Repository = "https://github.com/GuillaumeLessard/qector-decoder.git"
Issues = "https://github.com/GuillaumeLessard/qector-decoder/issues"
"Commercial licensing" = "https://www.qector.store"
